<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>

    <!-- Full spectrum rainbow sweeping diagonally across the blob -->
    <linearGradient id="rb" x1="5%" y1="5%" x2="95%" y2="95%">
      <stop offset="0%"   stop-color="#FF0080"/>
      <stop offset="14%"  stop-color="#FF3300"/>
      <stop offset="28%"  stop-color="#FFB000"/>
      <stop offset="44%"  stop-color="#22DD00"/>
      <stop offset="60%"  stop-color="#00AAFF"/>
      <stop offset="78%"  stop-color="#2200EE"/>
      <stop offset="100%" stop-color="#BB00FF"/>
    </linearGradient>

    <!-- Drop shadow for paint depth / emboss feel -->
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1.5" dy="2.5" stdDeviation="2.5"
                    flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <!-- White glow so {··} reads clearly over the rainbow fill -->
    <filter id="wg" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>

  <!--
    ══════════════════════════════════════════════════════════
    PAINT SPLAT BLOB
    Single organic shape — roughly Claude-logo silhouette
    (rounded hexagon feel) with paint-splash jagged edges,
    splatter tips, and drip bumps. Transparent outside.

    Path traces clockwise from top-center.
    Spikes at: top (~74,5), upper-right (~89,12), right (~98,52),
    lower-right (~94,70), lower-left (~6,70), left (~2,52),
    upper-left (~11,12), (~26,5).
    ══════════════════════════════════════════════════════════
  -->
  <path fill="url(#rb)" filter="url(#sh)" d="
    M 50,5
    C 56,4 63,6 69,11
    Q 74,5 77,11
    C 82,17 89,12 91,20
    C 94,28 90,38 94,46
    Q 98,52 93,56
    C 89,62 94,70 89,76
    C 84,82 77,76 73,84
    C 68,92 64,97 55,97
    Q 52,100 50,97
    Q 48,100 45,97
    C 36,97 32,92 27,84
    C 23,76 16,82 11,76
    C 6,70 11,62 7,56
    Q 2,52 6,46
    C 10,38 6,28 9,20
    C 11,12 18,17 23,11
    Q 26,5 31,11
    C 37,6 44,4 50,5 Z
  "/>

  <!-- Ink splatter dots radiating from each spike tip -->
  <circle cx="75" cy="3"  r="2"   fill="#FF5500"/>
  <circle cx="83" cy="7"  r="1.3" fill="#FF8800"/>
  <circle cx="92" cy="14" r="1.6" fill="#FFCC00"/>
  <circle cx="98" cy="36" r="1.2" fill="#88EE00"/>
  <circle cx="97" cy="56" r="1.8" fill="#00CC88"/>
  <circle cx="92" cy="76" r="1.3" fill="#0088FF"/>
  <circle cx="77" cy="93" r="1.7" fill="#4400FF"/>
  <circle cx="50" cy="99" r="1.5" fill="#8800EE"/>
  <circle cx="23" cy="93" r="1.7" fill="#CC00FF"/>
  <circle cx="8"  cy="76" r="1.3" fill="#FF00AA"/>
  <circle cx="3"  cy="56" r="1.8" fill="#FF0055"/>
  <circle cx="2"  cy="36" r="1.2" fill="#FF2200"/>
  <circle cx="8"  cy="14" r="1.6" fill="#FF6600"/>
  <circle cx="17" cy="7"  r="1.3" fill="#FFAA00"/>
  <circle cx="25" cy="3"  r="2"   fill="#CCFF00"/>

  <!-- ════════════════════════════════════════
       AUGMENT {··} — white with glow halo
       so it reads over any rainbow section
       ════════════════════════════════════════ -->

  <!-- Left brace { -->
  <path d="M 33,32 C 21,32 21,41 27,50 C 21,59 21,68 33,68"
        fill="none" stroke="#fff" stroke-width="3.5"
        stroke-linecap="round" filter="url(#wg)"/>

  <!-- Right brace } -->
  <path d="M 67,32 C 79,32 79,41 73,50 C 79,59 79,68 67,68"
        fill="none" stroke="#fff" stroke-width="3.5"
        stroke-linecap="round" filter="url(#wg)"/>

  <!-- Left eye · -->
  <circle cx="42" cy="50" r="5.5" fill="#fff" filter="url(#wg)"/>

  <!-- Right eye · -->
  <circle cx="58" cy="50" r="5.5" fill="#fff" filter="url(#wg)"/>

</svg>
