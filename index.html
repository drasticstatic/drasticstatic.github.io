<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Christopher Wilson — minimal root landing page with a clear path to the full portfolio and resume."
    />
    <title>Christopher Wilson</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #060816;
        --bg-alt: #11182b;
        --panel: rgba(10, 15, 30, 0.72);
        --panel-border: rgba(120, 138, 255, 0.18);
        --text: #e6edf7;
        --muted: #9fb0c8;
        --cyan: #72e7ff;
        --pink: #ff5bbd;
        --violet: #8a6dff;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(114, 231, 255, 0.16), transparent 34%),
          radial-gradient(circle at bottom right, rgba(255, 91, 189, 0.18), transparent 32%),
          linear-gradient(155deg, var(--bg) 0%, #0a1020 52%, var(--bg-alt) 100%);
        color: var(--text);
        overflow: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: auto;
        width: 18rem;
        height: 18rem;
        border-radius: 50%;
        filter: blur(48px);
        opacity: 0.22;
        pointer-events: none;
        animation: drift 14s ease-in-out infinite;
      }

      body::before {
        top: -4rem;
        left: -4rem;
        background: rgba(114, 231, 255, 0.75);
      }

      body::after {
        right: -6rem;
        bottom: -6rem;
        background: rgba(255, 91, 189, 0.7);
        animation-delay: -7s;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        position: relative;
      }

      section {
        width: min(100%, 42rem);
        text-align: center;
        position: relative;
        padding: 3rem clamp(1.5rem, 5vw, 3rem);
        border-radius: 28px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        backdrop-filter: blur(18px);
        box-shadow:
          0 22px 60px rgba(2, 6, 23, 0.48),
          0 0 0 1px rgba(255, 255, 255, 0.03) inset,
          0 0 36px rgba(114, 231, 255, 0.08);
      }

      section::before {
        content: "";
        position: absolute;
        top: 0;
        left: 12%;
        width: 76%;
        height: 2px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(114, 231, 255, 0), rgba(114, 231, 255, 0.9), rgba(255, 91, 189, 0.85), rgba(114, 231, 255, 0));
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.45rem 0.85rem;
        border-radius: 999px;
        background: rgba(114, 231, 255, 0.08);
        border: 1px solid rgba(114, 231, 255, 0.14);
        color: var(--cyan);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 0.72rem;
        font-weight: 700;
      }

      h1 {
        margin: 1.3rem 0 0.9rem;
        font-size: clamp(2.5rem, 7vw, 4.5rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .accent {
        background: linear-gradient(135deg, #ffffff 0%, var(--cyan) 42%, #d8c8ff 70%, #ffffff 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 24px rgba(114, 231, 255, 0.12);
      }

      p {
        margin: 0 auto;
        max-width: 32rem;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .cta {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.95rem 1.4rem;
        border-radius: 999px;
        background: linear-gradient(135deg, rgba(255, 91, 189, 0.95), rgba(114, 231, 255, 0.92));
        color: #071423;
        text-decoration: none;
        font-weight: 800;
        letter-spacing: 0.01em;
        box-shadow: 0 14px 28px rgba(114, 231, 255, 0.16), 0 10px 24px rgba(255, 91, 189, 0.18);
        transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
      }

      .cta:hover,
      .cta:focus-visible {
        transform: translateY(-2px);
        box-shadow: 0 18px 36px rgba(114, 231, 255, 0.22), 0 14px 32px rgba(255, 91, 189, 0.24);
        filter: saturate(1.05);
      }

      .cta:focus-visible {
        outline: 2px solid rgba(114, 231, 255, 0.9);
        outline-offset: 4px;
      }

      .note {
        margin-top: 1rem;
        font-size: 0.92rem;
        color: rgba(230, 237, 247, 0.72);
      }

      @keyframes drift {
        0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
        50% { transform: translate3d(1.25rem, 1rem, 0) scale(1.08); }
      }

      @media (max-width: 600px) {
        body { overflow: auto; }
        section { padding: 2.25rem 1.35rem; }
        p { font-size: 1rem; }
        .cta { width: 100%; }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <div class="eyebrow">Root landing page</div>
        <p>
        <br/>a simple entry point with a clearer atmosphere
        </p>
        <h1><span class="accent">Christopher<br />Stephen Wilson</span></h1>
        <p>
          <br/>click below to visit my full portfolio
        </p>
        <a class="cta" href="https://drasticstatic.github.io/resume/">ENTER HERE ↗</a>
        <div class="note"><br/>This root site is intentionally minimal <br /><br/> — the fuller experience is live at <strong>~/resume/</strong></div>
      </section>
    </main>
  </body>
</html>
